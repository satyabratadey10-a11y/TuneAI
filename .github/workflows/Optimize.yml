name: TuneAi Training Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-slm:
    runs-on: ubuntu-latest
    
    # This tells the runner to execute all 'run' commands inside the TuneAI subfolder
    defaults:
      run:
        working-directory: ./TuneAI
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install PyTorch CPU
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          
      - name: Prepare Dataset
        run: python data_prepare.py
        
      - name: Execute Training (1M Parameters)
        run: python train.py

      - name: Upload Compiled Model Weights
        uses: actions/upload-artifact@v4
        with:
          name: tuneai-v1-checkpoint
          # The artifact uploader runs from the repo root, so we must specify the subfolder path here
          path: TuneAI/checkpoints/tuneai_v1.pth
          retention-days: 5
