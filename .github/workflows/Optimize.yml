name: TuneAi Training
on: [push]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # This is the magic: it caches your pip dependencies
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Using the CPU-only version of torch is much smaller and faster to install

      - name: Run Training
        run: python train.py
        
      - name: Upload Model
        uses: actions/upload-artifact@v4
        with:
          name: tuneai-checkpoint
          path: checkpoints/tuneai_v1.pth
