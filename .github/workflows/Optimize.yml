name: TuneAi Training Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger the run manually from the GitHub UI

jobs:
  train-slm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to reduce 7-minute overhead

      - name: Install PyTorch CPU
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          
      - name: Prepare Dataset
        run: python data_prepare.py
        
      - name: Execute Training (1M Parameters)
        run: python train.py

      - name: Upload Compiled Model Weights
        uses: actions/upload-artifact@v4
        with:
          name: tuneai-v1-checkpoint
          path: checkpoints/tuneai_v1.pth
          retention-days: 5
